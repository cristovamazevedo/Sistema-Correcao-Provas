<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Sistema de Correção</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        button, .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .gabarito-visual {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 2px solid #e0e0e0;
            display: none;
        }
        .questoes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .questao-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #e0e0e0;
        }
        .questao-numero {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 12px;
            color: #667eea;
        }
        .opcoes {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .opcao {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            background: white;
            color: #667eea;
        }
        .opcao.selecionada {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .gabarito-resumo {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th { background: #f8f9fa; }
        .btn-small { padding: 5px 12px; font-size: 12px; margin: 2px; }
        .nav-links { text-align: center; margin-top: 20px; }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 16px;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Cadastro de Prova com Gabarito Visual</h1>
        <p>Preencha os dados e clique nos círculos para marcar as respostas CORRETAS</p>
    </div>

    <div class="card">
        <h2>📝 Dados da Prova</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>ID da Prova *</label>
                <input type="text" id="id_prova" value="PROVA001" placeholder="Ex: PROVA001">
            </div>
            <div class="form-group">
                <label>Valor Total da Prova *</label>
                <input type="number" id="valor_total" step="0.5" value="10.0">
            </div>
        </div>
        <div class="form-group">
            <label>Quantidade de Questões *</label>
            <input type="number" id="qtd_questoes" min="1" max="60" value="10">
        </div>

        <div id="gabaritoVisual" class="gabarito-visual">
            <h3>🎯 Marque as Respostas CORRETAS:</h3>
            <div id="questoesContainer" class="questoes-grid"></div>
            <div class="gabarito-resumo">
                <strong>Gabarito:</strong> <span id="gabaritoTexto">-</span>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="limparTudo()">🗑️ Limpar Tudo</button>
                <button onclick="gerarFolha()">📄 Gerar Folha de Respostas</button>
                <button onclick="salvarGabarito()">💾 Salvar Gabarito</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📚 Provas Cadastradas</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>ID</th><th>Questões</th><th>Valor</th><th>Gabarito</th><th>Ações</th></tr>
                </thead>
                <tbody id="provasList">
                    <tr><td colspan="5">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="nav-links">
        <a href="/">🏠 Início</a>
        <a href="/baixar_relatorio">📊 Relatório</a>
    </div>
</div>

<script>
    let questoes = [];
    const idProvaInput = document.getElementById('id_prova');
    const qtdQuestoesInput = document.getElementById('qtd_questoes');
    const valorTotalInput = document.getElementById('valor_total');
    const gabaritoVisual = document.getElementById('gabaritoVisual');

    qtdQuestoesInput.addEventListener('change', () => {
        if (parseInt(qtdQuestoesInput.value) > 0) {
            gerarQuestoes();
            gabaritoVisual.style.display = 'block';
        }
    });

    function gerarQuestoes() {
        const qtd = parseInt(qtdQuestoesInput.value);
        const container = document.getElementById('questoesContainer');
        container.innerHTML = '';
        questoes = [];
        for (let i = 1; i <= qtd; i++) {
            questoes.push({ numero: i, resposta: null });
            const div = document.createElement('div');
            div.className = 'questao-card';
            div.innerHTML = `
                <div class="questao-numero">Questão ${i}</div>
                <div class="opcoes" id="opcoes-${i}">
                    ${['A','B','C','D','E'].map(letra => `
                        <div class="opcao" onclick="selecionarResposta(${i}, '${letra}')" data-questao="${i}" data-letra="${letra}">
                            ${letra}
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
        }
        atualizarGabaritoTexto();
    }

    function selecionarResposta(questaoNum, letra) {
        const questao = questoes.find(q => q.numero === questaoNum);
        if (questao) questao.resposta = letra;
        const opcoesDiv = document.getElementById(`opcoes-${questaoNum}`);
        if (opcoesDiv) {
            opcoesDiv.querySelectorAll('.opcao').forEach(op => {
                if (op.getAttribute('data-letra') === letra) op.classList.add('selecionada');
                else op.classList.remove('selecionada');
            });
        }
        atualizarGabaritoTexto();
    }

    function atualizarGabaritoTexto() {
        const gabarito = questoes.map(q => q.resposta || '?').join('');
        document.getElementById('gabaritoTexto').innerHTML = gabarito;
    }

    function limparTudo() {
        if (confirm('Tem certeza que deseja limpar todas as respostas?')) {
            questoes.forEach(q => q.resposta = null);
            for (let i = 1; i <= questoes.length; i++) {
                const opcoesDiv = document.getElementById(`opcoes-${i}`);
                if (opcoesDiv) opcoesDiv.querySelectorAll('.opcao').forEach(op => op.classList.remove('selecionada'));
            }
            atualizarGabaritoTexto();
        }
    }

    async function gerarFolha() {
        const idProva = idProvaInput.value.trim().toUpperCase();
        const qtd = parseInt(qtdQuestoesInput.value);
        const valor = parseFloat(valorTotalInput.value);
        const gabarito = questoes.map(q => q.resposta || '?').join('');
        if (!idProva) { alert('Digite o ID da prova'); return; }
        if (gabarito.includes('?')) { alert('Marque todas as questões'); return; }
        const response = await fetch('/gerar_folha', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_prova: idProva, qtd_questoes: qtd, valor_total: valor, gabarito: gabarito })
        });
        if (response.ok) {
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `folha_${idProva}.png`;
            a.click();
            URL.revokeObjectURL(url);
            alert('Folha gerada!');
            carregarProvas();
        } else {
            const err = await response.json();
            alert('Erro: ' + err.error);
        }
    }

    async function salvarGabarito() {
        const idProva = idProvaInput.value.trim().toUpperCase();
        const qtd = parseInt(qtdQuestoesInput.value);
        const valor = parseFloat(valorTotalInput.value);
        const gabarito = questoes.map(q => q.resposta || '?').join('');
        if (!idProva) { alert('Digite o ID da prova'); return; }
        if (gabarito.includes('?')) { alert('Marque todas as questões'); return; }
        const response = await fetch('/api/salvar_gabarito_visual', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_prova: idProva, qtd_questoes: qtd, valor_total: valor, gabarito: gabarito })
        });
        const data = await response.json();
        if (data.success) alert('Gabarito salvo com sucesso!');
        else alert('Erro: ' + data.error);
        carregarProvas();
    }

    async function carregarProvas() {
        try {
            const response = await fetch('/listar_provas');
            const data = await response.json();
            const tbody = document.getElementById('provasList');
            tbody.innerHTML = '';
            if (data.provas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Nenhuma prova cadastrada</td></tr>';
                return;
            }
            data.provas.forEach(prova => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${prova.id}</strong></td>
                    <td>${prova.qtd_questoes}</td>
                    <td>${prova.valor_total}</td>
                    <td><code>${prova.gabarito}</code></td>
                    <td>
                        <button class="btn-small" onclick="baixarFolha('${prova.id}')">📄 Folha</button>
                        <button class="btn-small" onclick="baixarGabarito('${prova.id}')">📋 TXT</button>
                        <button class="btn-small" onclick="carregarProvaParaEdicao('${prova.id}')">✏️ Editar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error(error);
            document.getElementById('provasList').innerHTML = '<tr><td colspan="5">Erro ao carregar</td></tr>';
        }
    }

    function baixarFolha(id) { window.open(`/download/folha/${id}`, '_blank'); }
    function baixarGabarito(id) { window.open(`/baixar_gabarito/${id}`, '_blank'); }
    async function carregarProvaParaEdicao(id) {
        const response = await fetch(`/api/prova/${id}`);
        const data = await response.json();
        if (data.error) { alert(data.error); return; }
        idProvaInput.value = data.id_prova;
        qtdQuestoesInput.value = data.qtd_questoes;
        valorTotalInput.value = data.valor_total;
        gerarQuestoes();
        gabaritoVisual.style.display = 'block';
        const gabarito = data.gabarito;
        for (let i = 0; i < gabarito.length; i++) {
            if (gabarito[i] !== '?') selecionarResposta(i+1, gabarito[i]);
        }
        gabaritoVisual.scrollIntoView({ behavior: 'smooth' });
    }

    // Inicialização
    if (parseInt(qtdQuestoesInput.value) > 0) {
        gerarQuestoes();
        gabaritoVisual.style.display = 'block';
    }
    carregarProvas();
</script>
</body>
</html>
