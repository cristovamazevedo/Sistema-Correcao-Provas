<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Sistema de Correção</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            padding: 5px 10px;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 20px;
            max-width: 500px;
            max-height: 80%;
            overflow-y: auto;
        }

        .close {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>📊 Relatórios do Sistema</h1>
            <div class="nav-links">
                <a href="/">🏠 Início</a>
                <a href="/admin">📋 Administração</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>📈 Histórico de Correções</h2>

            <div class="filters">
                <select id="filtroProva">
                    <option value="">Todas as Provas</option>
                </select>
                <button onclick="aplicarFiltro()">🔍 Filtrar</button>
                <button onclick="exportarCSV()">📥 Exportar CSV</button>
                <button onclick="atualizar()">🔄 Atualizar</button>
            </div>

            <div style="overflow-x: auto;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>ID Prova</th>
                            <th>Nota</th>
                            <th>Acertos</th>
                            <th>%</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody id="correcoesList">
                        <tr><td colspan="6">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h3>Detalhes da Correção</h3>
            <div id="modalDetalhes"></div>
        </div>
    </div>

    <script>
        let todasCorrecoes = [];

        // Carregar provas para o filtro
        async function carregarProvasFiltro() {
            try {
                const response = await fetch('/api/listar_provas');
                const data = await response.json();

                const select = document.getElementById('filtroProva');
                data.provas.forEach(prova => {
                    const option = document.createElement('option');
                    option.value = prova.id_prova;
                    option.textContent = prova.id_prova;
                    select.appendChild(option);
                });

            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // Carregar correções
        async function carregarCorrecoes(idProva = '') {
            try {
                let url = '/api/listar_correcoes';
                if (idProva) {
                    url += `?id_prova=${idProva}`;
                }

                const response = await fetch(url);
                const data = await response.json();
                todasCorrecoes = data.correcoes;

                const tbody = document.getElementById('correcoesList');
                tbody.innerHTML = '';

                if (data.correcoes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">Nenhuma correção encontrada</td></tr>';
                    return;
                }

                data.correcoes.forEach(correcao => {
                    const total = Object.keys(correcao.erros).length;
                    const percentual = ((correcao.acertos / total) * 100).toFixed(1);

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${new Date(correcao.data_correcao).toLocaleString()}</td>
                        <td><strong>${correcao.id_prova}</strong></td>
                        <td><span class="badge badge-success">${correcao.nota}</span></td>
                        <td>${correcao.acertos}/${total}</td>
                        <td>${percentual}%</td>
                        <td><button onclick="verDetalhes(${correcao.id})">Ver</button></td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('correcoesList').innerHTML = '<tr><td colspan="6">Erro ao carregar</td></tr>';
            }
        }

        function aplicarFiltro() {
            const idProva = document.getElementById('filtroProva').value;
            carregarCorrecoes(idProva);
        }

        function atualizar() {
            carregarCorrecoes();
        }

        async function exportarCSV() {
            try {
                window.open('/api/exportar_relatorio', '_blank');
            } catch (error) {
                alert('Erro ao exportar');
            }
        }

        function verDetalhes(id) {
            const correcao = todasCorrecoes.find(c => c.id === id);
            if (!correcao) return;

            const modal = document.getElementById('modal');
            const detalhesDiv = document.getElementById('modalDetalhes');

            let html = `<p><strong>Prova:</strong> ${correcao.id_prova}</p>`;
            html += `<p><strong>Nota:</strong> ${correcao.nota}</p>`;
            html += `<p><strong>Acertos:</strong> ${correcao.acertos}/${Object.keys(correcao.erros).length}</p>`;
            html += `<h4>Questões:</h4>`;

            Object.entries(correcao.erros).forEach(([questao, info]) => {
                const status = info.status === 'acertou' ? '✅' : (info.status === 'errou' ? '❌' : '⚠️');
                html += `<p>${status} Questão ${questao}: ${info.aluno || '---'} (Correta: ${info.correta})</p>`;
            });

            detalhesDiv.innerHTML = html;
            modal.style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Inicializar
        carregarProvasFiltro();
        carregarCorrecoes();
    </script>
</body>
</html>
